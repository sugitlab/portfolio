name: Deploy on blog post label

on:
  issues:
    types:
      - labeled
  workflow_dispatch:

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'blog-post'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL secret is not set."
            exit 1
          fi

          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
